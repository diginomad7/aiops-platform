# AIOps Monitoring - Persistent Volumes Configuration
# Context7: Enhanced storage setup with ZFS backend (160GB total allocation)

apiVersion: v1
kind: PersistentVolume
metadata:
  name: prometheus-storage-pv
  labels:
    app: prometheus
    component: storage
    context: context7
spec:
  capacity:
    storage: 80Gi  # 50% of total 160GB for Prometheus
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path
  hostPath:
    path: /k3s-storage-pool/data/monitoring/prometheus
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - ubuser-h510m-h

