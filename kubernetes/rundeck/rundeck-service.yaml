---
apiVersion: v1
kind: Service
metadata:
  name: rundeck
  namespace: rundeck
  labels:
    app: rundeck
    component: orchestrator
spec:
  type: ClusterIP
  ports:
  - port: 4440
    targetPort: 4440
    protocol: TCP
    name: rundeck
  selector:
    app: rundeck
---
apiVersion: v1
kind: Service
metadata:
  name: rundeck-nodeport
  namespace: rundeck
  labels:
    app: rundeck
    component: orchestrator
spec:
  type: NodePort
  ports:
  - port: 4440
    targetPort: 4440
    nodePort: 30440
    protocol: TCP
    name: rundeck
  selector:
    app: rundeck
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rundeck-ingress
  namespace: rundeck
  labels:
    app: rundeck
    component: orchestrator
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/rule-type: "Host"
spec:
  rules:
  - host: rundeck.aiops.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rundeck
            port:
              number: 4440
  - host: localhost
    http:
      paths:
      - path: /rundeck
        pathType: Prefix
        backend:
          service:
            name: rundeck
            port:
              number: 4440
